services:
  shortlink:
    build: .
    # image: yourname/shortlink-go:latest
    container_name: shortlink-service
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      # - SECRET_KEY=your-random-secret-key
    restart: unless-stopped

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sehuatang 磁力爬虫控制台</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --card: #16213e;
            --card2: #1a1a2e;
            --border: rgba(255, 255, 255, 0.06);
            --text: #e0e0e0;
            --muted: #888;
            --accent: #667eea;
            --accent2: #764ba2;
            --pink: #ff6b9d;
            --green: #4caf50;
            --orange: #ff9800;
            --red: #f44336;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(135deg, var(--card), #0f3460);
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-sm {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-sm:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* ── Layout ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* ── Card ── */
        .card {
            background: var(--card2);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: #bbb;
        }

        .card-body {
            padding: 16px 20px;
        }

        /* ── Tab Nav ── */
        .tab-nav {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.03);
            color: var(--muted);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.06);
            color: #ccc;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ── Form elements ── */
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .form-row label {
            font-size: 12px;
            color: var(--muted);
            min-width: 70px;
            flex-shrink: 0;
        }

        .form-row input,
        .form-row select {
            flex: 1;
            min-width: 0;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-size: 13px;
            outline: none;
        }

        .form-row input:focus {
            border-color: var(--accent);
        }

        .form-row input[type="number"] {
            width: 80px;
            flex: none;
        }

        /* ── Buttons ── */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transform: translateY(-1px);
        }

        .btn-primary.running {
            background: linear-gradient(135deg, var(--orange), var(--red));
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .btn-danger {
            background: rgba(255, 60, 60, 0.15);
            color: var(--red);
            border: 1px solid rgba(255, 60, 60, 0.2);
        }

        .btn-danger:hover {
            background: rgba(255, 60, 60, 0.25);
        }

        .btn-success {
            background: rgba(76, 175, 80, 0.15);
            color: var(--green);
            border: 1px solid rgba(76, 175, 80, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        /* ── Log area ── */
        .log-area {
            max-height: 300px;
            overflow-y: auto;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.7;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .log-area::-webkit-scrollbar {
            width: 4px;
        }

        .log-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .log-entry {
            padding-left: 8px;
            border-left: 2px solid transparent;
            margin-bottom: 1px;
            color: #999;
        }

        .log-entry.info {
            border-left-color: var(--accent);
            color: #b0b0b0;
        }

        .log-entry.success {
            border-left-color: var(--green);
            color: #81c784;
        }

        .log-entry.warning {
            border-left-color: var(--orange);
            color: #ffb74d;
        }

        .log-entry.error {
            border-left-color: var(--red);
            color: #ef9a9a;
        }

        /* ── Progress bar ── */
        .progress-wrap {
            margin-bottom: 12px;
            display: none;
        }

        .progress-wrap.active {
            display: block;
        }

        .progress-bg {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.06);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--pink));
            background-size: 200% 100%;
            transition: width 0.4s;
            animation: gradient-move 2s linear infinite;
        }

        @keyframes gradient-move {
            0% {
                background-position: 0% 0%
            }

            100% {
                background-position: 200% 0%
            }
        }

        .progress-text {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
            text-align: center;
        }

        /* ── Stats ── */
        .stats {
            display: flex;
            gap: 20px;
            padding: 12px 0;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--muted);
        }

        .stat-val {
            font-weight: 700;
            font-size: 16px;
            background: linear-gradient(90deg, var(--accent), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ── File list ── */
        .file-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 6px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 13px;
            color: #ccc;
            word-break: break-all;
        }

        .file-meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }

        .file-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .file-actions .btn-sm {
            padding: 4px 10px;
            font-size: 11px;
        }

        /* ── Schedule list ── */
        .sched-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 8px;
        }

        .sched-info {
            flex: 1;
            min-width: 0;
        }

        .sched-name {
            font-size: 13px;
            font-weight: 600;
            color: #ccc;
        }

        .sched-detail {
            font-size: 11px;
            color: var(--muted);
            margin-top: 3px;
        }

        .sched-next {
            font-size: 11px;
            color: var(--accent);
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 22px;
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            z-index: 99999;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        .toast.success {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
        }

        .toast.error {
            background: linear-gradient(135deg, #f44336, #b71c1c);
        }

        .toast.info {
            background: linear-gradient(135deg, #2196F3, #1976D2);
        }

        /* ── Empty state ── */
        .empty {
            text-align: center;
            padding: 30px;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🧲 Sehuatang 磁力爬虫</h1>
        <div class="header-right">
            <button class="btn-sm" onclick="showTab('settings')">⚙️ 设置</button>
            <button class="btn-sm" onclick="location.href='/logout'">退出</button>
        </div>
    </div>

    <div class="container">
        <!-- Tab Navigation -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="crawl" onclick="showTab('crawl')">🕷️ 爬取任务</button>
            <button class="tab-btn" data-tab="results" onclick="showTab('results')">📁 结果文件</button>
            <button class="tab-btn" data-tab="schedule" onclick="showTab('schedule')">⏰ 定时任务</button>
            <button class="tab-btn" data-tab="settings" onclick="showTab('settings')">⚙️ 设置</button>
        </div>

        <!-- ═══════════ TAB: Crawl ═══════════ -->
        <div class="tab-content active" id="tab-crawl">
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <h2>📋 新建爬取任务</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-row">
                            <label>论坛 URL</label>
                            <input type="text" id="crawl-url" placeholder="https://sehuatang.net/forum-160-1.html">
                        </div>
                        <div class="form-row">
                            <label>起始页</label>
                            <input type="number" id="crawl-start" min="1" value="1">
                            <label style="min-width:auto">结束页</label>
                            <input type="number" id="crawl-end" min="1" value="1">
                        </div>
                        <div class="form-row">
                            <label>TG 频道</label>
                            <input type="text" id="crawl-tg" placeholder="可选，留空使用默认频道">
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-primary" id="btn-crawl" onclick="startCrawl()">▶ 开始爬取</button>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h2>📊 任务状态</h2>
                        <span id="task-phase" style="font-size:11px;color:#888;"></span>
                    </div>
                    <div class="card-body">
                        <div class="stats">
                            <div class="stat-item">帖子 <span class="stat-val" id="stat-threads">0</span></div>
                            <div class="stat-item">磁力 <span class="stat-val" id="stat-magnets">0</span></div>
                            <div class="stat-item">ED2K <span class="stat-val" id="stat-ed2k">0</span></div>
                            <div class="stat-item">总链接 <span class="stat-val" id="stat-total">0</span></div>
                        </div>
                        <div class="progress-wrap" id="progress-wrap">
                            <div class="progress-bg">
                                <div class="progress-fill" id="progress-fill"></div>
                            </div>
                            <div class="progress-text" id="progress-text"></div>
                        </div>
                        <div class="log-area" id="log-area">
                            <div class="empty">💡 点击「开始爬取」创建任务</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══════════ TAB: Results ═══════════ -->
        <div class="tab-content" id="tab-results">
            <div class="card">
                <div class="card-header">
                    <h2>📁 爬取结果文件</h2>
                    <button class="btn-sm" onclick="loadResults()">🔄 刷新</button>
                </div>
                <div class="card-body">
                    <div class="file-list" id="file-list">
                        <div class="empty">加载中...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══════════ TAB: Schedule ═══════════ -->
        <div class="tab-content" id="tab-schedule">
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <h2>➕ 添加定时任务</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-row">
                            <label>任务名称</label>
                            <input type="text" id="sched-name" placeholder="每日爬取 亚洲有码">
                        </div>
                        <div class="form-row">
                            <label>论坛 URL</label>
                            <input type="text" id="sched-url" placeholder="https://sehuatang.net/forum-160-1.html">
                        </div>
                        <div class="form-row">
                            <label>起始页</label>
                            <input type="number" id="sched-start" min="1" value="1">
                            <label style="min-width:auto">结束页</label>
                            <input type="number" id="sched-end" min="1" value="3">
                        </div>
                        <div class="form-row">
                            <label>Cron</label>
                            <input type="text" id="sched-cron" placeholder="0 8 * * *  (分 时 日 月 星期)">
                        </div>
                        <div class="form-row">
                            <label>TG 频道</label>
                            <input type="text" id="sched-tg" placeholder="可选 chat_id">
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="addSchedule()">➕ 添加任务</button>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h2>📋 已配置的定时任务</h2>
                        <button class="btn-sm" onclick="loadSchedules()">🔄 刷新</button>
                    </div>
                    <div class="card-body">
                        <div id="schedule-list">
                            <div class="empty">加载中...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ═══════════ TAB: Settings ═══════════ -->
        <div class="tab-content" id="tab-settings">
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <h2>🔐 安全设置</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-row">
                            <label>新密码</label>
                            <input type="password" id="set-password" placeholder="输入新密码">
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="changePassword()">修改密码</button>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h2>🤖 Telegram 设置</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-row">
                            <label>启用 TG</label>
                            <select id="set-tg-enabled">
                                <option value="false">关闭</option>
                                <option value="true">开启</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <label>Bot Token</label>
                            <input type="password" id="set-tg-token" placeholder="123456:ABC-DEF...">
                        </div>
                        <div class="form-row">
                            <label>默认 Chat ID</label>
                            <input type="text" id="set-tg-chatid" placeholder="如 @channel 或 -100xxxxx">
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="saveTgConfig()">保存 TG 设置</button>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h2>🕷️ 爬虫设置</h2>
                    </div>
                    <div class="card-body">
                        <div class="form-row">
                            <label>最小延迟(秒)</label>
                            <input type="number" id="set-delay-min" value="2" min="1">
                            <label style="min-width:auto">最大</label>
                            <input type="number" id="set-delay-max" value="4" min="1">
                        </div>
                        <div class="form-row">
                            <label>最大重试</label>
                            <input type="number" id="set-retries" value="5" min="1" max="20">
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="saveScraperConfig()">保存爬虫设置</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast" id="toast"></div>

    <script>
        /* ─── Globals ─── */
        let currentTaskId = null;
        let pollTimer = null;

        /* ─── Tabs ─── */
        function showTab(name) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            const tab = document.getElementById('tab-' + name);
            if (tab) tab.classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(el => {
                if (el.dataset.tab === name) el.classList.add('active');
            });
            if (name === 'results') loadResults();
            if (name === 'schedule') loadSchedules();
            if (name === 'settings') loadConfig();
        }

        /* ─── Toast ─── */
        function toast(msg, type = 'info') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + type + ' show';
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        /* ─── API helper ─── */
        async function api(url, method = 'GET', body = null) {
            const opts = { method, headers: {} };
            if (body) {
                opts.headers['Content-Type'] = 'application/json';
                opts.body = JSON.stringify(body);
            }
            const resp = await fetch(url, opts);
            if (resp.status === 401) { location.href = '/login'; return null; }
            return resp.json();
        }

        /* ═══════ Crawl ═══════ */
        async function startCrawl() {
            const url = document.getElementById('crawl-url').value.trim();
            const start = parseInt(document.getElementById('crawl-start').value) || 1;
            const end = parseInt(document.getElementById('crawl-end').value) || 1;
            const tg = document.getElementById('crawl-tg').value.trim();

            if (!url) { toast('请输入论坛 URL', 'error'); return; }

            const data = await api('/api/crawl', 'POST', {
                forum_url: url, start_page: start, end_page: end, tg_chat_id: tg
            });
            if (data && data.task_id) {
                currentTaskId = data.task_id;
                toast('任务已创建: ' + data.task_id, 'success');
                document.getElementById('btn-crawl').textContent = '⏹ 停止';
                document.getElementById('btn-crawl').classList.add('running');
                document.getElementById('btn-crawl').onclick = stopCrawl;
                document.getElementById('progress-wrap').classList.add('active');
                startPolling();
            }
        }

        async function stopCrawl() {
            if (currentTaskId) {
                await api('/api/crawl/' + currentTaskId + '/stop', 'POST');
                toast('停止信号已发送', 'info');
            }
        }

        function startPolling() {
            if (pollTimer) clearInterval(pollTimer);
            pollTimer = setInterval(pollStatus, 2000);
            pollStatus();
        }

        async function pollStatus() {
            if (!currentTaskId) return;
            const data = await api('/api/status/' + currentTaskId);
            if (!data) return;

            // Stats
            document.getElementById('stat-threads').textContent = data.stats?.threads || 0;
            document.getElementById('stat-magnets').textContent = data.stats?.magnets || 0;
            document.getElementById('stat-ed2k').textContent = data.stats?.ed2k || 0;
            document.getElementById('stat-total').textContent = data.stats?.total || 0;
            document.getElementById('task-phase').textContent = data.phase || '';

            // Progress
            document.getElementById('progress-fill').style.width = (data.progress || 0) + '%';
            document.getElementById('progress-text').textContent = data.phase + ' (' + (data.progress || 0) + '%)';

            // Logs
            const logArea = document.getElementById('log-area');
            logArea.innerHTML = '';
            (data.logs || []).forEach(entry => {
                const div = document.createElement('div');
                div.className = 'log-entry ' + entry.level;
                div.textContent = '[' + entry.time + '] ' + entry.msg;
                logArea.appendChild(div);
            });
            logArea.scrollTop = logArea.scrollHeight;

            // Check completion
            if (['completed', 'failed', 'stopped'].includes(data.status)) {
                clearInterval(pollTimer);
                pollTimer = null;
                document.getElementById('btn-crawl').textContent = '▶ 开始爬取';
                document.getElementById('btn-crawl').classList.remove('running');
                document.getElementById('btn-crawl').onclick = startCrawl;
                if (data.status === 'completed') {
                    toast('🎉 爬取完成！共 ' + (data.stats?.total || 0) + ' 个链接', 'success');
                } else if (data.status === 'failed') {
                    toast('❌ 爬取失败', 'error');
                } else {
                    toast('⏹ 爬取已停止', 'info');
                }
            }
        }

        /* ═══════ Results ═══════ */
        async function loadResults() {
            const data = await api('/api/results');
            const list = document.getElementById('file-list');
            if (!data || data.length === 0) {
                list.innerHTML = '<div class="empty">暂无结果文件</div>';
                return;
            }
            list.innerHTML = '';
            data.forEach(file => {
                const size = file.size > 1024 ? (file.size / 1024).toFixed(1) + ' KB' : file.size + ' B';
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
            <div class="file-info">
                <div class="file-name">${file.name}</div>
                <div class="file-meta">${file.modified} · ${size}</div>
            </div>
            <div class="file-actions">
                <button class="btn-sm" onclick="downloadFile('${file.name}')">⬇️ 下载</button>
                <button class="btn-sm" onclick="deleteFile('${file.name}')">🗑️</button>
            </div>
        `;
                list.appendChild(item);
            });
        }

        function downloadFile(name) {
            window.open('/api/download/' + encodeURIComponent(name), '_blank');
        }

        async function deleteFile(name) {
            if (!confirm('确认删除 ' + name + '？')) return;
            await api('/api/results/' + encodeURIComponent(name), 'DELETE');
            toast('已删除 ' + name, 'info');
            loadResults();
        }

        /* ═══════ Schedule ═══════ */
        async function loadSchedules() {
            const data = await api('/api/schedule');
            const list = document.getElementById('schedule-list');
            const tasks = data?.tasks || [];
            const jobs = data?.jobs || [];

            if (tasks.length === 0) {
                list.innerHTML = '<div class="empty">暂无定时任务</div>';
                return;
            }

            list.innerHTML = '';
            tasks.forEach(task => {
                const job = jobs.find(j => j.id === task.id);
                const nextRun = job ? job.next_run : 'N/A';
                const item = document.createElement('div');
                item.className = 'sched-item';
                item.innerHTML = `
            <div class="sched-info">
                <div class="sched-name">${task.name || task.id}</div>
                <div class="sched-detail">${task.forum_url} · 页 ${task.start_page}-${task.end_page} · cron: ${task.cron}</div>
                ${task.tg_chat_id ? '<div class="sched-detail">📨 TG: ' + task.tg_chat_id + '</div>' : ''}
                <div class="sched-next">⏭ 下次执行: ${nextRun}</div>
            </div>
            <button class="btn-sm btn-danger" onclick="deleteSchedule('${task.id}')">删除</button>
        `;
                list.appendChild(item);
            });
        }

        async function addSchedule() {
            const data = {
                name: document.getElementById('sched-name').value.trim(),
                forum_url: document.getElementById('sched-url').value.trim(),
                start_page: parseInt(document.getElementById('sched-start').value) || 1,
                end_page: parseInt(document.getElementById('sched-end').value) || 1,
                cron: document.getElementById('sched-cron').value.trim(),
                tg_chat_id: document.getElementById('sched-tg').value.trim(),
            };
            if (!data.forum_url || !data.cron) {
                toast('请填写论坛 URL 和 Cron 表达式', 'error'); return;
            }
            const resp = await api('/api/schedule', 'POST', data);
            if (resp?.error) { toast(resp.error, 'error'); return; }
            toast('✅ 定时任务已添加', 'success');
            loadSchedules();
        }

        async function deleteSchedule(id) {
            if (!confirm('确认删除该定时任务？')) return;
            await api('/api/schedule/' + id, 'DELETE');
            toast('已删除', 'info');
            loadSchedules();
        }

        /* ═══════ Settings ═══════ */
        async function loadConfig() {
            const data = await api('/api/config');
            if (!data) return;

            document.getElementById('set-tg-enabled').value = String(data.telegram?.enabled || false);
            if (data.telegram?.bot_token && data.telegram.bot_token !== '***') {
                document.getElementById('set-tg-token').value = data.telegram.bot_token;
            }
            document.getElementById('set-tg-chatid').value = data.telegram?.default_chat_id || '';
            document.getElementById('set-delay-min').value = data.scraper?.delay_min || 2;
            document.getElementById('set-delay-max').value = data.scraper?.delay_max || 4;
            document.getElementById('set-retries').value = data.scraper?.max_retries || 5;
        }

        async function changePassword() {
            const pw = document.getElementById('set-password').value.trim();
            if (!pw || pw.length < 3) { toast('密码不能少于 3 个字符', 'error'); return; }
            const resp = await api('/api/password', 'POST', { password: pw });
            if (resp?.message) toast('✅ 密码已修改', 'success');
            document.getElementById('set-password').value = '';
        }

        async function saveTgConfig() {
            const data = {
                telegram: {
                    enabled: document.getElementById('set-tg-enabled').value === 'true',
                    bot_token: document.getElementById('set-tg-token').value.trim(),
                    default_chat_id: document.getElementById('set-tg-chatid').value.trim(),
                }
            };
            await api('/api/config', 'POST', data);
            toast('✅ TG 设置已保存', 'success');
        }

        async function saveScraperConfig() {
            const data = {
                scraper: {
                    delay_min: parseInt(document.getElementById('set-delay-min').value) || 2,
                    delay_max: parseInt(document.getElementById('set-delay-max').value) || 4,
                    max_retries: parseInt(document.getElementById('set-retries').value) || 5,
                }
            };
            await api('/api/config', 'POST', data);
            toast('✅ 爬虫设置已保存', 'success');
        }

        /* ─── Init ─── */
        document.addEventListener('DOMContentLoaded', () => {
            // Check for any running tasks
            api('/api/status').then(data => {
                if (!data) return;
                for (const [tid, task] of Object.entries(data)) {
                    if (task.status === 'running') {
                        currentTaskId = tid;
                        document.getElementById('btn-crawl').textContent = '⏹ 停止';
                        document.getElementById('btn-crawl').classList.add('running');
                        document.getElementById('btn-crawl').onclick = stopCrawl;
                        document.getElementById('progress-wrap').classList.add('active');
                        startPolling();
                        break;
                    }
                }
            });
        });
    </script>
</body>

</html>
